{% extends 'base.html' %}
{% load staticfiles %}

{% block title %}留樣位置管理{% endblock %}

{% block css %}
<link rel="stylesheet" href="/static/css/index.css">
<style>
    .tableAround {
        padding: 20px;
        -moz-box-shadow: 0px 0px 10px #333333;
        -webkit-box-shadow: 0px 0px 10px #333333;
        box-shadow: 0px 0px 10px #333333;
        border-radius: 10px;
        background-color: rgba(255,255,255,0.1);
    }
    .search-row {
        margin-bottom: 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    .el-dialog {
        width: 600px;
    }
</style>
{% endblock %}

{% block content %}
<div id="app">
    <div class="tableAround">
        <div class="search-row">
            <el-button type="primary" size="small" @click="showAddDialog">新增位置</el-button>
            <el-input v-model="searchKeyword" placeholder="搜索區域或編號" style="width: 200px;" size="small" @keyup.enter.native="loadData"></el-input>
            <el-button type="primary" size="small" @click="loadData">搜索</el-button>
        </div>

        <el-table :data="locationList" border height="500" v-loading="loading" stripe>
            <el-table-column prop="area" label="留樣位置" align="center" min-width="150"></el-table-column>
            <el-table-column prop="rack" label="留樣載具" align="center" min-width="120"></el-table-column>
            <el-table-column prop="cell" label="No." align="center" min-width="100"></el-table-column>
            <el-table-column prop="description" label="目前擺放物品" align="center" min-width="200" show-overflow-tooltip></el-table-column>
            <el-table-column prop="created_at" label="創建時間" align="center" width="160"></el-table-column>
            <el-table-column label="操作" align="center" width="200" fixed="right">
                <template slot-scope="scope">
                    <el-button size="mini" type="primary" @click="handleEdit(scope.row)">编辑</el-button>
                    <el-button size="mini" type="danger" @click="handleDelete(scope.row)">删除</el-button>
                </template>
            </el-table-column>
        </el-table>
    </div>

    <!-- 新增/编辑对话框 -->
    <el-dialog :title="dialogTitle" :visible.sync="dialogVisible" width="50%">
        <el-form :model="form" label-width="120px" ref="form" :rules="rules">
            <el-form-item label="留樣位置" prop="area">
                <el-input v-model="form.area" placeholder="例如：Plant3 1FA-28"></el-input>
            </el-form-item>
            <el-form-item label="留樣載具" prop="rack">
                <el-input v-model="form.rack" placeholder="例如：四層鋼架"></el-input>
            </el-form-item>
            <el-form-item label="No." prop="cell">
                <el-input v-model="form.cell" placeholder="例如：J1-1"></el-input>
            </el-form-item>
            <el-form-item label="目前擺放物品" prop="description">
                <el-input type="textarea" v-model="form.description" rows="3" placeholder="備註信息"></el-input>
            </el-form-item>
        </el-form>
        <div slot="footer">
            <el-button @click="dialogVisible = false">取消</el-button>
            <el-button type="primary" @click="saveLocation">確認</el-button>
        </div>
    </el-dialog>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/es6/polyfill.min.js"></script>
<script src="/static/js/es6/babel.min.js"></script>
<script src="/static/js/axios.min.js"></script>
<script src="/static/js/vue.min.js"></script>
<script src="/static/js/qs.js"></script>
<script src="/static/js/Element/index.js"></script>

<script type="text/babel">
new Vue({
    el: '#app',
    delimiters: ['${', '}'],
    data() {
        return {
            loading: false,
            locationList: [],
            searchKeyword: '',
            dialogVisible: false,
            dialogTitle: '新增位置',
            form: {
                id: null,
                area: '',
                rack: '',
                cell: '',
                description: ''
            },
            rules: {
                area: [{ required: true, message: '請輸入留樣位置', trigger: 'blur' }],
                cell: [{ required: true, message: '請輸入No.', trigger: 'blur' }]
            }
        };
    },
    mounted() {
        this.loadData();
    },
    methods: {
        loadData() {
            this.loading = true;
            axios.get('/RetainedSample/location_api/', { params: { search: this.searchKeyword } })
                .then(res => {
                    if (res.data.success) {
                        this.locationList = res.data.data;
                    } else {
                        this.$message.error(res.data.message || '加載失敗');
                    }
                })
                .catch(err => {
                    console.error(err);
                    this.$message.error('加載失敗');
                })
                .finally(() => {
                    this.loading = false;
                });
        },
        showAddDialog() {
            this.dialogTitle = '新增位置';
            this.form = { id: null, area: '', rack: '', cell: '', description: '' };
            this.dialogVisible = true;
            this.$nextTick(() => {
                if (this.$refs.form) {
                    this.$refs.form.clearValidate();
                }
            });
        },
        handleEdit(row) {
            this.dialogTitle = '編輯位置';
            this.form = { ...row };
            this.dialogVisible = true;
            this.$nextTick(() => {
                if (this.$refs.form) {
                    this.$refs.form.clearValidate();
                }
            });
        },
        saveLocation() {
            this.$refs.form.validate(valid => {
                if (!valid) return;
                this.loading = true;
                const url = '/RetainedSample/location_api/';
                const method = 'post';
                const data = {
                    Key_Post: this.form.id ? 'editdata' : 'adddata',
                    ...this.form
                };
                axios({ method, url, data })
                    .then(res => {
                        if (res.data.success) {
                            this.$message.success(this.form.id ? '修改成功' : '新增成功');
                            this.dialogVisible = false;
                            this.loadData();
                        } else {
                            this.$message.error(res.data.message);
                        }
                    })
                    .catch(err => {
                        console.error(err);
                        this.$message.error('操作失敗');
                    })
                    .finally(() => {
                        this.loading = false;
                    });
            });
        },
        handleDelete(row) {
            this.$confirm('確認刪除此位置？若已被留樣記錄引用，可能導致數據不一致。', '警告', {
                confirmButtonText: '確定',
                cancelButtonText: '取消',
                type: 'warning'
            }).then(() => {
                this.loading = true;
                axios.post('/RetainedSample/location_api/', {
                    Key_Post: 'deletedata',
                    id: row.id
                })
                .then(res => {
                    if (res.data.success) {
                        this.$message.success('刪除成功');
                        this.loadData();
                    } else {
                        this.$message.error(res.data.message);
                    }
                })
                .catch(err => {
                    console.error(err);
                    this.$message.error('刪除失敗');
                })
                .finally(() => {
                    this.loading = false;
                });
            }).catch(() => {});
        }
    }
});
</script>
{% endblock %}
